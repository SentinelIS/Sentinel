<div class="setup-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>System Setup</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="setup()">
        <h2>Company Details</h2>
        <mat-form-field appearance="fill">
          <mat-label>Company Name</mat-label>
          <input matInput formControlName="companyName" />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Company Description</mat-label>
          <input matInput formControlName="companyDesc" />
        </mat-form-field>

        <h2>Administrator User</h2>
        <mat-form-field appearance="fill">
          <mat-label>Firstname</mat-label>
          <input matInput formControlName="firstname" />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Surname</mat-label>
          <input matInput formControlName="surname" />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Username / Abbreviation</mat-label>
          <input matInput formControlName="userAbbr" />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Role</mat-label>
          <input matInput formControlName="role" />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" />
        </mat-form-field>
        <mat-form-field appearance="fill">
          <mat-label>Repeat Password</mat-label>
          <input matInput formControlName="passwordRepeat" type="password" />
          <mat-error *ngIf="form.hasError('passwordsNotMatching')">Passwords do not match.</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Complete Setup</button>
      </form>
    </mat-card-content>
     <mat-card-actions>
      <a routerLink="/login">Already have an account?</a>
    </mat-card-actions>
  </mat-card>
</div>
